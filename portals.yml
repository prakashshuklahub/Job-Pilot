# salary_filter removed — accept all salary ranges when listed (no min/max gate)

# Filters job DESCRIPTION when a provider returns one (Lever, some boards).
# Empty description → pass. Tuned to cv.md + config/profile.yml stack_focus.

content_filter:
  positive:
    # Core — React/TS/Node (5+ yrs, Loopcrypto, Enkash, THG)
    - "react"
    - "typescript"
    - "javascript"
    - "node.js"
    - "node"
    - "next.js"
    - "nextjs"
    # Role shape
    - "frontend"
    - "full stack"
    - "fullstack"
    - "web developer"
    # Backend adjacency (Express, REST — cv.md)
    - "express"
    - "rest api"
    # Secondary frontend (Townhall — Angular; Enkash/Townhall — Tailwind)
    - "angular"
    - "tailwind"
    # CMS / marketing stack (profile.yml — WordPress/PHP targets)
    - "wordpress"
    - "php"
  negative:
    # E-commerce CMS you don't ship (not in cv.md)
    - "magento"
    - "shopify"
    - "prestashop"
    # Enterprise platforms / admin roles
    - "salesforce"
    - "sap "
    - "oracle ebs"
    - "servicenow"
    # Mobile / native (not your focus)
    - "ios"
    - "android"
    - "swift"
    - "kotlin"
    # Stacks you don't target (title_filter also blocks many of these)
    - ".net"
    - "c#"
    - "ruby on rails"
    - "drupal"
    - "joomla"
    - "embedded"
    - "firmware"
    - "devops"
    - "sre"
    - "data scientist"
    - "machine learning"
    - "scrum master"
    - "qa engineer"
    - "test engineer"

